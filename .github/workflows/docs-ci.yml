name: Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'docs/.vitepress/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs/.vitepress/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
